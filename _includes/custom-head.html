{%- comment -%}
  Favicon links — minima theme's _includes/head.html invokes custom-head.html
  at the end of <head> as the documented hook for site-level additions.
  Source PNG is the iOS app icon (1024×1024); sizes generated via `sips`.
{%- endcomment -%}
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/favicon-192.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/favicon-512.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon-180.png' | relative_url }}">
